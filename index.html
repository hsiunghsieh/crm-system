<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推薦清單記錄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --surface: #ffffff;
    --surface2: #f3efe8;
    --border: #e2d9c8;
    --accent: #c0773a;
    --accent2: #7a5c3a;
    --text: #2a2018;
    --text2: #7a6a54;
    --text3: #b8a890;
    --tag-restaurant: #c84b4b;
    --tag-hotel: #4b7bc8;
    --tag-attraction: #4ba87c;
    --tag-shopping: #9b59b6;
    --shadow: 0 2px 12px rgba(42,32,24,0.08);
    --shadow-lg: 0 8px 32px rgba(42,32,24,0.14);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--text);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: #faf8f4;
    letter-spacing: 0.05em;
  }
  header .subtitle {
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 0.1em;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .header-count {
    margin-left: auto;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.78rem;
    color: var(--text3);
  }
  .header-count span { color: var(--accent); font-weight: 700; }

  /* TABS */
  .tabs {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    display: flex;
    gap: 0;
    padding: 0 24px;
    overflow-x: auto;
    position: sticky;
    top: 77px;
    z-index: 99;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 14px 22px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 7px;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--accent); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }
  .tab .tab-count {
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .tab.active .tab-count { background: #fde8d4; color: var(--accent); }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ADD FORM */
  .form-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px;
    border: 1px solid var(--border);
  }
  .form-card h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .form-card h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .type-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .type-btn {
    padding: 14px 8px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text2);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .type-btn .type-icon { font-size: 1.6rem; }
  .type-btn:hover { border-color: var(--accent); color: var(--accent); }
  .type-btn.active {
    border-color: var(--accent);
    background: #fdf3ea;
    color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,119,58,0.12);
  }

  .form-fields { display: none; }
  .form-fields.visible { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-grid .full { grid-column: 1 / -1; }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .field-group label .required { color: var(--accent); margin-left: 2px; }
  .field-group input,
  .field-group textarea,
  .field-group select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s;
    outline: none;
  }
  .field-group input:focus,
  .field-group textarea:focus,
  .field-group select:focus { border-color: var(--accent); background: #fff; }
  .field-group textarea { min-height: 90px; resize: vertical; }

  .radio-group {
    display: flex; gap: 10px;
  }
  .radio-btn {
    flex: 1;
    padding: 9px 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.18s;
    background: var(--bg);
    user-select: none;
  }
  .radio-btn.yes.selected { border-color: #4ba87c; background: #edf7f3; color: #2d7a58; }
  .radio-btn.no.selected { border-color: #c84b4b; background: #fdeaea; color: #c84b4b; }
  .radio-btn:not(.selected):hover { border-color: var(--accent); }

  .form-section-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 20px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .btn-submit {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-submit:active { transform: none; }

  /* SUCCESS TOAST */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--text);
    color: #faf8f4;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { transform: none; opacity: 1; }

  /* LIST VIEW */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; gap: 16px; flex-wrap: wrap;
  }
  .list-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .list-title .count-badge {
    background: var(--surface2);
    color: var(--text2);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* FILTERS */
  .filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
  .filter-group label { font-size: 0.75rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .filter-group select,
  .filter-group input {
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-group select:focus,
  .filter-group input:focus { border-color: var(--accent); }
  .btn-reset {
    padding: 7px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.83rem;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    align-self: flex-end;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 18px;
  }

  .item-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: all 0.25s;
    animation: fadeIn 0.35s ease;
  }
  .item-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent); }

  .card-top {
    background: var(--surface2);
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .card-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .card-icon.restaurant { background: #fdeaea; }
  .card-icon.hotel { background: #eaf0fd; }
  .card-icon.attraction { background: #edf7f3; }
  .card-icon.shopping { background: #f5eafd; }

  .card-title-area { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    word-break: break-word;
  }
  .card-type-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .badge-restaurant { background: #fdeaea; color: var(--tag-restaurant); }
  .badge-hotel { background: #eaf0fd; color: var(--tag-hotel); }
  .badge-attraction { background: #edf7f3; color: var(--tag-attraction); }
  .badge-shopping { background: #f5eafd; color: var(--tag-shopping); }

  .card-body { padding: 14px 18px; }
  .card-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 7px; font-size: 0.85rem;
  }
  .card-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    min-width: 52px;
  }
  .card-value { color: var(--text); word-break: break-word; }
  .card-desc {
    color: var(--text2);
    font-size: 0.83rem;
    line-height: 1.6;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .card-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;
  }
  .card-tag {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text2);
    font-weight: 500;
  }
  .tag-yes { background: #edf7f3; color: #2d7a58; }
  .tag-no { background: #fdeaea; color: #c84b4b; }

  .card-links {
    padding: 10px 18px 14px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .card-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.78rem;
    padding: 5px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.18s;
  }
  .link-maps {
    background: #e8f1fd; color: #2563eb;
    border: 1px solid #bdd1f7;
  }
  .link-maps:hover { background: #2563eb; color: white; }
  .link-url {
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border);
  }
  .link-url:hover { border-color: var(--accent); color: var(--accent); }

  .card-footer {
    padding: 8px 18px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-date { font-size: 0.72rem; color: var(--text3); }
  .btn-delete {
    background: none; border: none; cursor: pointer;
    font-size: 0.75rem; color: var(--text3);
    padding: 3px 8px; border-radius: 5px;
    transition: all 0.18s;
  }
  .btn-delete:hover { color: #c84b4b; background: #fdeaea; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 64px 24px;
    color: var(--text3);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 14px; }
  .empty-state p { font-size: 0.9rem; }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg);
    min-height: 100px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .img-upload-area:hover { border-color: var(--accent); background: #fdf3ea; }
  .img-upload-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text2); font-size: 0.85rem; pointer-events: none;
  }
  .img-preview-thumb {
    max-width: 100%; max-height: 180px;
    border-radius: 8px; object-fit: contain;
    pointer-events: none;
  }
  .btn-img-clear {
    margin-top: 8px;
    background: #fdeaea; border: 1px solid #f5c0c0;
    color: #c84b4b; border-radius: 6px;
    padding: 4px 12px; font-size: 0.78rem;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; transition: all 0.18s;
  }
  .btn-img-clear:hover { background: #c84b4b; color: white; }

  /* CARD IMAGE THUMBNAIL */
  .card-img-wrap {
    width: 100%; overflow: hidden;
    max-height: 180px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: zoom-in;
  }
  .card-img-wrap img {
    width: 100%; height: 180px;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .card-img-wrap:hover img { transform: scale(1.04); }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 9999;
    align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .lightbox.show { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 88vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute; top: 20px; right: 28px;
    color: white; font-size: 2rem; cursor: pointer;
    line-height: 1; opacity: 0.8;
    transition: opacity 0.18s;
  }
  .lightbox-close:hover { opacity: 1; }

  /* MENU MANAGEMENT */
  .menu-mgmt-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media(max-width:600px) { .menu-mgmt-grid { grid-template-columns: 1fr; } }
  .menu-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .menu-section-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .menu-section-header span:first-child {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem; font-weight: 600;
  }
  .menu-desc { font-size: 0.75rem; color: var(--text3); }
  .menu-add-row {
    display: flex; gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .menu-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }
  .menu-input:focus { border-color: var(--accent); background: #fff; }
  .btn-menu-add {
    padding: 8px 16px;
    background: var(--accent);
    color: white; border: none;
    border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: background 0.18s;
  }
  .btn-menu-add:hover { background: var(--accent2); }
  .menu-tag-list {
    list-style: none;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 80px;
  }
  .menu-tag-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 0.88rem;
    animation: fadeIn 0.25s ease;
  }
  .menu-tag-item span { color: var(--text); }
  .btn-tag-del {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 1rem; padding: 0 4px;
    border-radius: 4px; transition: all 0.18s;
    line-height: 1;
  }
  .btn-tag-del:hover { color: #c84b4b; background: #fdeaea; }
  .menu-empty {
    color: var(--text3); font-size: 0.82rem;
    text-align: center; padding: 12px 0;
  }

  /* EDIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(42,32,24,0.45);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 32px;
    overflow-y: auto;
  }
  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  .modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    width: 100%; max-width: 640px;
    padding: 28px 28px 24px;
    position: relative;
    animation: slideUp 0.25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.1rem; font-weight: 600;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .modal-close {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none; font-size: 1.4rem;
    color: var(--text3); cursor: pointer;
    transition: color 0.18s;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    padding: 9px 20px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem; font-weight: 600;
    color: var(--text2); cursor: pointer;
    transition: all 0.18s;
  }
  .btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save {
    padding: 9px 24px;
    background: var(--accent);
    border: none; border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.9rem; font-weight: 700;

  <span class="lightbox-close" onclick="closeLightbox()">✕</span>

<script>
// ═══════════════════════════════════════════════════
//  ⚙️  請將下方網址換成你自己的 Apps Script 部署網址
// ═══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbyQ-fqfuIUMNg2rDoDV8z6lhhzZO71FMnd5-5rBVaT-aLtqYS9hXFv5qlVsKsWrfgpK/exec';
// ═══════════════════════════════════════════════════

const MENU_KEY = 'rec_menu_v1';
let data = [];
let menuData = JSON.parse(localStorage.getItem(MENU_KEY) || '{"region":[],"where":[]}');
let currentImgBase64 = null;
let editingId = null;

// ───── API 層 ─────
async function apiFetch(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload),
  });
  // no-cors 不回傳 body，樂觀更新即可
  return { ok: true };
}

async function apiLoad() {
  const res = await fetch(API_URL + '?t=' + Date.now());
  return res.json();
}

function save() {}
function saveMenu() { localStorage.setItem(MENU_KEY, JSON.stringify(menuData)); }

function syncUI() {
  updateCounts();
  const activeType = document.querySelector('.tab.active')?.dataset.tab;
  if (activeType && activeType !== 'add' && activeType !== 'menu') renderList(activeType);
}

function setApiStatus(msg, ok) {
  const el = document.getElementById('api-status');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'inline-block' : 'none';
  el.style.color = ok ? 'var(--tag-attraction)' : 'var(--tag-restaurant)';
  el.style.borderColor = ok ? '#b8d4c0' : '#f5c0c0';
  el.style.background = ok ? '#eef6f1' : '#fdeaea';
}

// ───── IMAGE UPLOAD ─────
function handleImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    currentImgBase64 = e.target.result;
    document.getElementById('s-img-preview').src = currentImgBase64;
    document.getElementById('s-img-preview').style.display = 'block';
    document.getElementById('s-img-placeholder').style.display = 'none';
    document.getElementById('s-img-clear').style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

function clearImg() {
  currentImgBase64 = null;
  document.getElementById('s-img-input').value = '';
  document.getElementById('s-img-preview').style.display = 'none';
  document.getElementById('s-img-preview').src = '';
  document.getElementById('s-img-placeholder').style.display = 'flex';
  document.getElementById('s-img-clear').style.display = 'none';
}

// ───── LIGHTBOX ─────
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// ───── MENU MANAGEMENT ─────
function renderMenuPanel() {
  ['region','where'].forEach(key => {
    const ul = document.getElementById('list-' + key);
    const items = menuData[key];
    if (items.length === 0) {
      ul.innerHTML = '<li class="menu-empty">尚無選項，請新增</li>';
    } else {
      ul.innerHTML = items.map((v,i) => `
        <li class="menu-tag-item">
          <span>${esc(v)}</span>
          <button class="btn-tag-del" onclick="deleteMenuOption('${key}',${i})" title="刪除">✕</button>
        </li>`).join('');
    }
  });
  updateDatalist();
}

function updateDatalist() {
  document.getElementById('dl-region').innerHTML =
    menuData.region.map(v => `<option value="${esc(v)}">`).join('');
  document.getElementById('dl-where').innerHTML =
    menuData.where.map(v => `<option value="${esc(v)}">`).join('');
}

function addMenuOption(key) {
  const inputId = key === 'region' ? 'new-region' : 'new-where';
  const val = document.getElementById(inputId).value.trim();
  if (!val) { showToast('請輸入名稱', '⚠️'); return; }
  if (menuData[key].includes(val)) { showToast('已有相同選項', '⚠️'); return; }
  menuData[key].push(val);
  saveMenu();
  document.getElementById(inputId).value = '';
  renderMenuPanel();
  showToast('選項已新增', '✅');
  // 同步選單到 Sheets
  apiFetch({ action: 'saveMenu', menuData });
}

function deleteMenuOption(key, idx) {
  if (!confirm(`確定刪除「${menuData[key][idx]}」？`)) return;
  menuData[key].splice(idx, 1);
  saveMenu();
  renderMenuPanel();
  apiFetch({ action: 'saveMenu', menuData });
}

// ───── TABS ─────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'menu') {
      renderMenuPanel();
    } else if (t.dataset.tab !== 'add') {
      renderList(t.dataset.tab);
    }
  });
});

// ───── TYPE SELECTOR ─────
let currentType = null;
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-fields').forEach(f => f.classList.remove('visible'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    document.getElementById('fields-' + currentType).classList.add('visible');
  });
});

// ───── RADIO BUTTONS ─────
document.querySelectorAll('.radio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const field = btn.dataset.field;
    const val = btn.dataset.val;
    document.querySelectorAll(`.radio-btn[data-field="${field}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById(field).value = val;
  });
});

// ───── SUBMIT ─────
function submitForm() {
  if (!currentType) { showToast('請先選擇類別！', '⚠️'); return; }

  let item = { id: Date.now(), type: currentType, date: new Date().toLocaleDateString('zh-TW') };

  if (currentType === 'restaurant') {
    const name = document.getElementById('r-name').value.trim();
    if (!name) { showToast('請輸入餐廳名稱', '⚠️'); return; }
    item = { ...item, name, region: document.getElementById('r-region').value.trim(),
      maps: document.getElementById('r-maps').value.trim(),
      url: document.getElementById('r-url').value.trim(),
      desc: document.getElementById('r-desc').value.trim() };
  } else if (currentType === 'hotel') {
    const name = document.getElementById('h-name').value.trim();
    if (!name) { showToast('請輸入住宿名稱', '⚠️'); return; }
    item = { ...item, name, region: document.getElementById('h-region').value.trim(),
      maps: document.getElementById('h-maps').value.trim(),
      url: document.getElementById('h-url').value.trim(),
      desc: document.getElementById('h-desc').value.trim(),
      pool: document.getElementById('h-pool').value,
      kids: document.getElementById('h-kids').value,
      park: document.getElementById('h-park').value };
  } else if (currentType === 'attraction') {
    const name = document.getElementById('a-name').value.trim();
    if (!name) { showToast('請輸入景點名稱', '⚠️'); return; }
    item = { ...item, name, region: document.getElementById('a-region').value.trim(),
      maps: document.getElementById('a-maps').value.trim(),
      url: document.getElementById('a-url').value.trim(),
      desc: document.getElementById('a-desc').value.trim(),
      park: document.getElementById('a-park').value };
  } else if (currentType === 'shopping') {
    const name = document.getElementById('s-name').value.trim();
    if (!name) { showToast('請輸入品項名稱', '⚠️'); return; }
    item = { ...item, name, where: document.getElementById('s-where').value.trim(),
      price: document.getElementById('s-price').value.trim(),
      url: document.getElementById('s-url').value.trim(),
      desc: document.getElementById('s-desc').value.trim(),
      img: currentImgBase64 || null };
  }

  setBtnLoading(true);
  data.push(item);           // 樂觀更新：先顯示
  syncUI();
  resetForm();
  showToast('儲存中…', '⏳');
  apiFetch({ action: 'add', item })
    .then(() => showToast('推薦新增成功！', '✅'))
    .catch(() => {
      data.pop();
      syncUI();
      showToast('儲存失敗，請檢查 API 設定', '❌');
    })
    .finally(() => setBtnLoading(false));
}

function resetForm() {
  document.querySelectorAll('.form-fields input, .form-fields textarea').forEach(el => el.value = '');
  document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.form-fields').forEach(f => f.classList.remove('visible'));
  clearImg();
  currentType = null;
}

// ───── COUNTS ─────
function updateCounts() {
  const types = ['restaurant','hotel','attraction','shopping'];
  let total = 0;
  types.forEach(t => {
    const n = data.filter(d => d.type === t).length;
    document.getElementById('cnt-' + t).textContent = n;
    total += n;
  });
  document.querySelector('#totalCount span').textContent = total;
}

// ───── RENDER LIST ─────
const typeConfig = {
  restaurant: { icon: '🍜', label: '餐廳', badge: 'badge-restaurant' },
  hotel: { icon: '🏨', label: '住宿', badge: 'badge-hotel' },
  attraction: { icon: '🗺️', label: '景點', badge: 'badge-attraction' },
  shopping: { icon: '🛍️', label: '購物', badge: 'badge-shopping' },
};

function renderList(type) {
  const container = document.getElementById('list-' + type);

  let items = data.filter(d => d.type === type);

  if (type === 'restaurant') {
    const name = document.getElementById('rf-name').value.toLowerCase();
    const region = document.getElementById('rf-region').value;
    if (name) items = items.filter(i => i.name.toLowerCase().includes(name));
    if (region) items = items.filter(i => i.region === region);
    updateRegionFilter('rf-region', type);
  } else if (type === 'hotel') {
    const name = document.getElementById('hf-name').value.toLowerCase();
    const region = document.getElementById('hf-region').value;
    const pool = document.getElementById('hf-pool').value;
    const kids = document.getElementById('hf-kids').value;
    const park = document.getElementById('hf-park').value;
    if (name) items = items.filter(i => i.name.toLowerCase().includes(name));
    if (region) items = items.filter(i => i.region === region);
    if (pool) items = items.filter(i => i.pool === pool);
    if (kids) items = items.filter(i => i.kids === kids);
    if (park) items = items.filter(i => i.park === park);
    updateRegionFilter('hf-region', type);
  } else if (type === 'attraction') {
    const name = document.getElementById('af-name').value.toLowerCase();
    const region = document.getElementById('af-region').value;
    const park = document.getElementById('af-park').value;
    if (name) items = items.filter(i => i.name.toLowerCase().includes(name));
    if (region) items = items.filter(i => i.region === region);
    if (park) items = items.filter(i => i.park === park);
    updateRegionFilter('af-region', type);
  } else if (type === 'shopping') {
    const name = document.getElementById('sf-name').value.toLowerCase();
    const where = document.getElementById('sf-where').value;
    if (name) items = items.filter(i => i.name.toLowerCase().includes(name));
    if (where) items = items.filter(i => i.where === where);
    updateWhereFilter('sf-where', type);
  }

  const badgeEl = document.querySelector(`#panel-${type} .count-badge`);
  if (badgeEl) badgeEl.textContent = items.length;

  if (items.length === 0) {
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📭</div>
      <p>目前沒有符合條件的推薦<br>快去新增第一筆吧！</p>
    </div>`;
    return;
  }

  container.innerHTML = items.map(item => buildCard(item)).join('');
}

function buildCard(item) {
  const cfg = typeConfig[item.type];
  let rows = '';
  let tags = '';

  if (item.type === 'restaurant') {
    if (item.region) rows += row('地區', item.region);
  } else if (item.type === 'hotel') {
    if (item.region) rows += row('地區', item.region);
    if (item.pool || item.kids || item.park) {
      tags = `<div class="card-tags">
        ${item.pool ? `<span class="card-tag ${item.pool==='是'?'tag-yes':'tag-no'}">泳池 ${item.pool}</span>` : ''}
        ${item.kids ? `<span class="card-tag ${item.kids==='是'?'tag-yes':'tag-no'}">親子設施 ${item.kids}</span>` : ''}
        ${item.park ? `<span class="card-tag ${item.park==='是'?'tag-yes':'tag-no'}">停車 ${item.park}</span>` : ''}
      </div>`;
    }
  } else if (item.type === 'attraction') {
    if (item.region) rows += row('地區', item.region);
    if (item.park) tags = `<div class="card-tags">
      <span class="card-tag ${item.park==='是'?'tag-yes':'tag-no'}">停車 ${item.park}</span>
    </div>`;
  } else if (item.type === 'shopping') {
    if (item.where) rows += row('在哪買', item.where);
    if (item.price) rows += row('價格', item.price);
  }

  const links = [];
  if (item.maps) links.push(`<a class="card-link link-maps" href="${esc(item.maps)}" target="_blank">📍 Google Maps</a>`);
  if (item.url) links.push(`<a class="card-link link-url" href="${esc(item.url)}" target="_blank">🔗 推薦連結</a>`);

  const imgHtml = (item.type === 'shopping' && item.img)
    ? `<div class="card-img-wrap" onclick="openLightbox('${item.img}')"><img src="${item.img}" alt="商品圖片" loading="lazy"></div>`
    : '';

  return `<div class="item-card">
    ${imgHtml}
    <div class="card-top">
      <div class="card-icon ${item.type}">${cfg.icon}</div>
      <div class="card-title-area">
        <div class="card-name">${esc(item.name)}</div>
        <span class="card-type-badge ${cfg.badge}">${cfg.label}</span>
      </div>
    </div>
    <div class="card-body">
      ${rows}
      ${tags}
      ${item.desc ? `<div class="card-desc">${esc(item.desc)}</div>` : ''}
    </div>
    ${links.length ? `<div class="card-links">${links.join('')}</div>` : ''}
    <div class="card-footer">
      <span class="card-date">新增於 ${item.date}</span>
      <div style="display:flex;gap:4px">
        <button class="btn-edit" onclick="openEditModal(${item.id})">✏️ 編輯</button>
        <button class="btn-delete" onclick="deleteItem(${item.id})">🗑 刪除</button>
      </div>
    </div>
  </div>`;
}

function row(label, value) {
  return `<div class="card-row"><span class="card-label">${label}</span><span class="card-value">${esc(value)}</span></div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ───── DELETE ─────
function deleteItem(id) {
  if (!confirm('確定要刪除這筆推薦嗎？')) return;
  const backup = [...data];
  data = data.filter(d => d.id !== id);  // 樂觀更新
  syncUI();
  apiFetch({ action: 'delete', id })
    .catch(() => {
      data = backup;
      syncUI();
      showToast('刪除失敗，請重試', '❌');
    });
}

let editImgBase64 = null;
let editImgRemoved = false;

function handleEditImgUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    editImgBase64 = e.target.result;
    editImgRemoved = false;
    const prev = document.getElementById('e-img-preview');
    if (prev) { prev.src = editImgBase64; prev.style.display = 'block'; }
    const ph = document.getElementById('e-img-placeholder');
    if (ph) ph.style.display = 'none';
    const clr = document.getElementById('e-img-clear');
    if (clr) clr.style.display = 'inline-block';
    document.getElementById('e-img-keep').value = '1';
  };
  reader.readAsDataURL(file);
}

function clearEditImg() {
  editImgBase64 = null;
  editImgRemoved = true;
  const prev = document.getElementById('e-img-preview');
  if (prev) { prev.style.display = 'none'; prev.src = ''; }
  const ph = document.getElementById('e-img-placeholder');
  if (ph) ph.style.display = 'flex';
  const clr = document.getElementById('e-img-clear');
  if (clr) clr.style.display = 'none';
  document.getElementById('e-img-keep').value = '0';
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
  editingId = null;
  editImgBase64 = null;
  editImgRemoved = false;
}

function saveEdit() {
  const idx = data.findIndex(d => d.id === editingId);
  if (idx === -1) return;
  const item = data[idx];
  const name = document.getElementById('e-name')?.value.trim();
  if (!name) { showToast('名稱不可空白', '⚠️'); return; }

  item.name = name;
  if (item.type !== 'shopping') {
    item.region = document.getElementById('e-region')?.value.trim() || '';
    item.maps = document.getElementById('e-maps')?.value.trim() || '';
  }
  item.url = document.getElementById('e-url')?.value.trim() || '';
  item.desc = document.getElementById('e-desc')?.value.trim() || '';

  if (item.type === 'hotel') {
    item.pool = document.getElementById('e-pool')?.value || '';
    item.kids = document.getElementById('e-kids')?.value || '';
    item.park = document.getElementById('e-park')?.value || '';
  } else if (item.type === 'attraction') {
    item.park = document.getElementById('e-park')?.value || '';
  } else if (item.type === 'shopping') {
    item.where = document.getElementById('e-where')?.value.trim() || '';
    item.price = document.getElementById('e-price')?.value.trim() || '';
    const keep = document.getElementById('e-img-keep')?.value;
    if (editImgBase64) {
      item.img = editImgBase64;
    } else if (editImgRemoved || keep === '0') {
      item.img = null;
    }
  }

  data[idx] = item;
  closeEditModal();
  syncUI();
  showToast('儲存中…', '⏳');
  apiFetch({ action: 'update', item })
    .then(() => showToast('已儲存更新！', '✅'))
    .catch(() => showToast('儲存失敗，請重試', '❌'));
}

// ───── REGION / WHERE FILTERS ─────
function updateRegionFilter(selectId, type) {
  const sel = document.getElementById(selectId);
  const current = sel.value;
  const regions = [...new Set(data.filter(d => d.type === type && d.region).map(d => d.region))].sort();
  sel.innerHTML = '<option value="">全部地區</option>' + regions.map(r => `<option value="${esc(r)}" ${r===current?'selected':''}>${esc(r)}</option>`).join('');
}

function updateWhereFilter(selectId, type) {
  const sel = document.getElementById(selectId);
  const current = sel.value;
  const wheres = [...new Set(data.filter(d => d.type === type && d.where).map(d => d.where))].sort();
  sel.innerHTML = '<option value="">全部通路</option>' + wheres.map(w => `<option value="${esc(w)}" ${w===current?'selected':''}>${esc(w)}</option>`).join('');
}

// ───── RESET FILTERS ─────
function resetFilters(type) {
  if (type === 'restaurant') {
    document.getElementById('rf-name').value = '';
    document.getElementById('rf-region').value = '';
  } else if (type === 'hotel') {
    ['hf-name','hf-region','hf-pool','hf-kids','hf-park'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  } else if (type === 'attraction') {
    document.getElementById('af-name').value = '';
    document.getElementById('af-region').value = '';
    document.getElementById('af-park').value = '';
  } else if (type === 'shopping') {
    document.getElementById('sf-name').value = '';
    document.getElementById('sf-where').value = '';
  }
  renderList(type);
}

// ───── TOAST ─────
function showToast(msg, icon = '✅') {
  const t = document.getElementById('toast');
  t.innerHTML = `${icon} ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ───── HELPER ─────
function setBtnLoading(on) {
  const btn = document.getElementById('btnSubmit');
  if (!btn) return;
  btn.disabled = on;
  btn.textContent = on ? '⏳ 儲存中…' : '＋ 新增推薦';
}

function showLoadingOverlay(msg) {
  let el = document.getElementById('loading-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loading-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(250,248,244,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;font-family:Noto Sans TC,sans-serif;';
    el.innerHTML = '<div style="font-size:2rem">⏳</div><div style="color:var(--text2);font-size:0.95rem"></div>';
    document.body.appendChild(el);
  }
  el.querySelector('div:last-child').textContent = msg;
  el.style.display = 'flex';
}

function hideLoadingOverlay() {
  const el = document.getElementById('loading-overlay');
  if (el) el.style.display = 'none';
}

// ───── INIT ─────
(async () => {
  if (API_URL.includes('YOUR_SCRIPT_ID')) {
    showToast('請先設定 API_URL！', '⚠️');
    setApiStatus('⚠️ 尚未設定 API', false);
    updateCounts();
    updateDatalist();
    return;
  }
  showLoadingOverlay('正在從 Google Sheets 載入資料…');
  try {
    data = await apiLoad();
    if (!Array.isArray(data)) data = [];
    setApiStatus('✓ 已連線 Google Sheets', true);
  } catch(e) {
    showToast('載入失敗，請確認 API 網址設定', '❌');
    setApiStatus('✗ 無法連線 Sheets', false);
    data = [];
  }
  hideLoadingOverlay();
  updateCounts();
  updateDatalist();
})();
</script>
</body>
</html>
